<!DOCTYPE html>
<!-- html 주석 -->
<html>
    <head>
        <title>Ideun Jeon's page</title>
        <link rel="icon" href="/favicon.ico">
    </head>
    <body>
        <script src="js.js"></script>
        <style>
            @import "css.css";
        </style>
        <h1>전이든의 페이지</h1>
        <h3>* 이 사람은 누구일까요?</h3>
        <p>대학생입니다.</p>
        <h3>* 뭔 페이지 인가요?</h3>
        <p>html 연습장입니다.</p>
        <div class="circular-progress" id="circularProgress">
            <span id="circularValue">50%</span>
        </div>
        <progress max="100" value="50" id="progress1"></progress>
        <p id="progress2">50</p>
        <button onclick="progressup()">+</button><button onclick="progressdown()">-</button>
        <br>
        <input type="range" id="sliderController" min="0" max="100" value="50" oninput="slider()">
        <h4>* 그래서 이 사람 뭐함?</h4>
        <p>그러게 뭐하냐</p>
    </body>
</html>
